version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: credito-hipotecario-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: creditohipotecario
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credito-hipotecario-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/creditohipotecario
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: ${JWT_SECRET:-clave-secreta-para-desarrollo-local-32chars}
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-tucorreo@gmail.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-tu-app-password}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: